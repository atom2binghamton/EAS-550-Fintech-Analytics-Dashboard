name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get branch expiration date
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy psycopg2-binary python-dotenv dbt-postgres

      - name: Run Schema Setup
        run: psql "$DATABASE_URL" -f schema.sql
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

      - name: Run Security RBAC Setup
        run: psql "$DATABASE_URL" -f security.sql
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

      - name: Run Index Setup
        run: psql "$DATABASE_URL" -f indexes.sql
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

      - name: Run Data Ingestion
        run: python ingest_data.py
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

      - name: Create dbt profiles.yml for preview branch
        run: |
          python3 -c "
          import os
          from urllib.parse import urlparse
          url = urlparse(os.environ['DATABASE_URL'])
          import pathlib
          pathlib.Path(os.path.expanduser('~/.dbt')).mkdir(exist_ok=True)
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(f'''fintech_analytics:\n  target: dev\n  outputs:\n    dev:\n      type: postgres\n      host: {url.hostname}\n      user: {url.username}\n      password: {url.password}\n      port: {url.port or 5432}\n      dbname: {url.path.lstrip('/')}\n      schema: public\n      threads: 4\n      sslmode: require\n''')
          "
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

      - name: Run dbt build on preview branch
        working-directory: ./fintech_dbt
        run: |
          dbt deps
          dbt build
        env:
          DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url }}"

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}